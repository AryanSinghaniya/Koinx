<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KoinX Reconciliation</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Transaction Reconciliation Engine</h1>
        <div class="upload-section">
            <div class="file-input">
                <label for="user_file">User Transactions (CSV)</label>
                <input type="file" id="user_file" name="user_file" accept=".csv">
            </div>
            <div class="file-input">
                <label for="exchange_file">Exchange Transactions (CSV)</label>
                <input type="file" id="exchange_file" name="exchange_file" accept=".csv">
            </div>
        </div>
        <button id="reconcile-btn">Start Reconciliation</button>
        <div id="summary" class="summary-section"></div>
        <div id="report" class="report-section"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
